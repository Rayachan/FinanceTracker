name: Expense Tracker CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Stage 1 - Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # Stage 2 - Install dependencies and run tests
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest tests/ -v

      # Stage 3 - Build and Push Docker Image
      - name: Build and Push Docker Image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest

      # Stage 4 - Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest
            docker stop expense-tracker || true
            docker rm expense-tracker || true
            docker run -d -p 5000:5000 --name expense-tracker ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest


